# DockDocs self-hosted conversion engine.
# Gotenberg (Chromium + LibreOffice) behind Caddy (auto-HTTPS + shared-secret auth).
# Drives Office->PDF / html->PDF / url->PDF / PDF/A marginal cost to ~$0.
# Full provisioning guide: ./README.md
# 2026-06-15 redeploy: bring the reverse (pdf->docx/xlsx) service online — the box
# was still running the pre-reverse build, so /reverse/* 404'd through to Gotenberg.
services:
  gotenberg:
    build: .                       # ./Dockerfile = gotenberg/gotenberg:8 + Liberation/Noto/Carlito fonts
    restart: unless-stopped
    command:
      - gotenberg
      - --api-timeout=120s         # allow big/complex documents
      - --libreoffice-restart-after=10   # contain LibreOffice memory growth
      - --chromium-restart-after=10      # contain Chromium url-route memory leak
    expose:
      - "3000"                     # internal only — never published to the internet directly
    networks: [edge]

  reverse:
    build: ./reverse               # FastAPI pdf2docx + pdfplumber (PDF → DOCX/XLSX)
    restart: unless-stopped
    expose:
      - "4000"                     # internal only
    environment:
      DOCKDOCS_REVERSE_SECRET: ${GOTENBERG_SECRET}   # reuse same shared secret
    networks: [edge]

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on: [gotenberg, reverse]
    ports:
      - "80:80"
      - "443:443"
    env_file: .env                 # GOTENBERG_DOMAIN, GOTENBERG_SECRET
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [edge]

networks:
  edge: {}
volumes:
  caddy_data: {}
  caddy_config: {}
